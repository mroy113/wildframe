# S0-13: CI gate on macOS. Per CONTRIBUTING.md all of the following must pass
# before a PR may merge: configure+build in debug and release, ctest, the
# format-check target (NFR-7), and the clang-tidy gate (NFR-8).
#
# Caching strategy:
#   - vcpkg binary cache via the official x-gha backend. Avoids rebuilding
#     Qt 6 / OpenCV / onnxruntime / etc. on every run. The first run is slow
#     (full source build of all deps); subsequent runs restore from cache.
#   - Fetched assets (build/_models, build/_fixtures) cached by the hashes of
#     the files that pin them. Any change to tools/fetch_*.cmake invalidates
#     the cache and the next run re-downloads.
#
# vcpkg is cloned at vcpkg.json's builtin-baseline so the checkout and the
# manifest stay in lockstep. When S0-15 lands, the vcpkg commit pin will be
# promoted to a documented developer-environment decision; until then the
# manifest's baseline is the single source of truth.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos:
    name: macOS — build, test, format-check, clang-tidy
    runs-on: macos-14
    timeout-minutes: 240
    env:
      # Route vcpkg's binary cache through GitHub Actions cache.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # Share a single install tree across all three presets. Without this,
      # each preset's configure unpacks every port from the binary cache into
      # its own build/<preset>/vcpkg_installed/, tripling the vcpkg cost per
      # run (observed ~1 h per preset → ~3 h before the project compiles).
      # All three presets use the same arm64-osx triplet, so sharing is safe.
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/build/_vcpkg_installed
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vcpkg's x-gha backend reads these two env vars to talk to the Actions
      # cache service. They are present in the runner environment by default
      # but not inherited by child processes until re-exported.
      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja, LLVM (clang-format, clang-tidy), and vcpkg build prerequisites
        # autoconf / autoconf-archive / automake / libtool are required by
        # autotools-based vcpkg ports (e.g. libb2, transitive via exiv2);
        # the runner's Xcode toolchain does not ship them.
        run: brew install ninja llvm autoconf autoconf-archive automake libtool

      - name: Bootstrap vcpkg at vcpkg.json builtin-baseline
        run: |
          set -euo pipefail
          BASELINE=$(jq -r '."builtin-baseline"' vcpkg.json)
          if [ -z "$BASELINE" ] || [ "$BASELINE" = "null" ]; then
            echo "error: vcpkg.json has no builtin-baseline" >&2
            exit 1
          fi
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          git -C "$HOME/vcpkg" checkout "$BASELINE"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Cache fetched assets (ONNX models + CR3 fixtures)
        uses: actions/cache@v4
        with:
          path: |
            build/_models
            build/_fixtures
          key: wildframe-assets-${{ hashFiles('tools/fetch_models.cmake', 'tools/fetch_fixtures.cmake') }}

      - name: Configure (debug)
        run: cmake --preset debug

      - name: Build (debug)
        run: cmake --build --preset debug

      - name: Test (debug)
        run: ctest --preset debug

      - name: Format check
        run: cmake --build --preset debug --target format-check

      - name: Configure (release)
        run: cmake --preset release

      - name: Build (release)
        run: cmake --build --preset release

      - name: Configure (tidy)
        run: cmake --preset tidy

      - name: Clang-tidy gate (zero findings)
        run: cmake --build --preset tidy
